name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - project: FinancialBalance.Api
            image: transaction-api
            dockerfile: src/FinancialBalance.Api/Dockerfile
          - project: FinancialBalance.ReportingApi
            image: reporting-api
            dockerfile: src/FinancialBalance.ReportingApi/Dockerfile
          - project: FinancialBalance.Worker
            image: reporting-worker
            dockerfile: src/FinancialBalance.Worker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Set image tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_TAG=sha-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Deploy Transaction API
        run: |
          kubectl set image deployment/transaction-api \
            transaction-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/transaction-api:${{ env.IMAGE_TAG }} \
            -n financial-balance

      - name: Deploy Reporting API
        run: |
          kubectl set image deployment/reporting-api \
            reporting-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reporting-api:${{ env.IMAGE_TAG }} \
            -n financial-balance

      - name: Deploy Worker
        run: |
          kubectl set image deployment/reporting-worker \
            reporting-worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reporting-worker:${{ env.IMAGE_TAG }} \
            -n financial-balance

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/transaction-api -n financial-balance --timeout=120s
          kubectl rollout status deployment/reporting-api -n financial-balance --timeout=120s
          kubectl rollout status deployment/reporting-worker -n financial-balance --timeout=120s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Set image tag from git tag
        run: |
          echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Deploy Transaction API
        run: |
          kubectl set image deployment/transaction-api \
            transaction-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/transaction-api:${{ env.IMAGE_TAG }} \
            -n financial-balance

      - name: Deploy Reporting API
        run: |
          kubectl set image deployment/reporting-api \
            reporting-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reporting-api:${{ env.IMAGE_TAG }} \
            -n financial-balance

      - name: Deploy Worker
        run: |
          kubectl set image deployment/reporting-worker \
            reporting-worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reporting-worker:${{ env.IMAGE_TAG }} \
            -n financial-balance

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/transaction-api -n financial-balance --timeout=180s
          kubectl rollout status deployment/reporting-api -n financial-balance --timeout=180s
          kubectl rollout status deployment/reporting-worker -n financial-balance --timeout=180s

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
